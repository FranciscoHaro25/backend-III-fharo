paths:
  /api/users:
    get:
      summary: Obtener todos los usuarios
      tags:
        - Users
      description: Trae todos los usuarios.
      responses:
        "200":
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "500":
          description: Error interno del servidor

  /api/users/{uid}:
    get:
      summary: Obtener un usuario por ID
      tags:
        - Users
      description: Busca un usuario por su ID.
      parameters:
        - name: uid
          in: path
          required: true
          description: ID del usuario a buscar
          schema:
            type: string
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    $ref: "#/components/schemas/User"
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: string
                    example: User not found
        "500":
          description: Error interno del servidor

    put:
      summary: Actualizar un usuario
      tags:
        - Users
      description: Actualiza un usuario por su ID.
      parameters:
        - name: uid
          in: path
          required: true
          description: ID del usuario a actualizar
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "200":
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User updated
        "404":
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: string
                    example: User not found
        "500":
          description: Error interno del servidor

    delete:
      summary: Eliminar un usuario
      tags:
        - Users
      description: Elimina un usuario por su ID.
      parameters:
        - name: uid
          in: path
          required: true
          description: ID del usuario a eliminar
          schema:
            type: string
      responses:
        "200":
          description: Usuario eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User deleted
        "500":
          description: Error interno del servidor

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          description: ID de MongoDB
          example: "644bcc7f001234abcd567890"
        first_name:
          type: string
          description: Nombre del usuario
          example: "Francisco"
        last_name:
          type: string
          description: Apellido del usuario
          example: "Haro"
        email:
          type: string
          description: Email del usuario
          example: "francisco@email.com"
        password:
          type: string
          description: Password hasheado
          example: "$2b$10$..."
        role:
          type: string
          description: Rol del usuario
          enum:
            - user
            - admin
          example: "user"
        pets:
          type: array
          description: Lista de IDs de mascotas del usuario
          items:
            type: object
            properties:
              _id:
                type: string
                example: "644bcc7f001234abcd567891"

    UserInput:
      type: object
      properties:
        first_name:
          type: string
          description: Nombre del usuario
          example: "Francisco"
        last_name:
          type: string
          description: Apellido del usuario
          example: "Haro"
        email:
          type: string
          description: Email del usuario
          example: "francisco@email.com"
        password:
          type: string
          description: Contraseña del usuario
          example: "password123"
